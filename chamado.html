<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Novo Chamado</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow mx-auto" style="max-width: 600px;">

    <div class="card-header bg-primary text-white">
      Novo Chamado
    </div>

    <div class="card-body">

      <div id="erro-msg"></div>

      <form>

        <!-- CLIENTE -->
        <div class="mb-3">
          <label class="form-label">Cliente</label>
          <input id="cliente" type="text" class="form-control" placeholder="Nome do cliente">
        </div>

        <!-- DESCRIÇÃO -->
        <div class="mb-3">
          <label class="form-label">Descrição do Problema</label>
          <textarea id="descricao" class="form-control" rows="3"></textarea>
        </div>

        <!-- TIPO DE SERVIÇO -->
        <div class="mb-3">
          <label class="form-label">Tipo de Serviço</label>
          <select id="idtipo" class="form-select">
            <option value="">Selecione...</option>
          </select>
        </div>

        <!-- DATA ABERTURA -->
        <div class="mb-3">
          <label class="form-label">Data/Hora Abertura</label>
          <input id="data_abertura" type="datetime-local" class="form-control">
        </div>

        <!-- DATA CONCLUSÃO -->
        <div class="mb-3">
          <label class="form-label">Data/Hora Conclusão</label>
          <input id="data_conclusao" type="datetime-local" class="form-control">
        </div>

        <!-- TEMPO -->
        <div class="mb-3">
          <label class="form-label">Tempo (horas)</label>
          <input id="tempo" type="text" class="form-control" readonly>
        </div>

        <!-- VALOR -->
        <div class="mb-3">
          <label class="form-label">Valor Total (R$)</label>
          <input id="valor" type="text" class="form-control" readonly>
        </div>

        <!-- BOTÕES -->
        <div class="d-flex justify-content-between">
          <a href="index.html" class="btn btn-secondary">Voltar</a>
          <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>

      </form>

    </div>

  </div>

</div>

<!-- API -->
<script src="front/js/api/config.js"></script>
<script src="front/js/api/tipo-servico.js"></script>
<script src="front/js/api/chamado.js"></script>

<!-- MOMENT (ANTES DO CALCULO) -->
<script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/moment.min.js"></script>

<!-- UTIL -->
<script src="front/js/utils/calculo.js"></script>

<!-- PAGE -->
<script src="front/js/pages/chamado-page.js"></script>

</body>
</html>
