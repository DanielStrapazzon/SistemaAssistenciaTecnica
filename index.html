<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Sistema de Assistência Técnica</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container mt-4">

    <h3>Painel do Sistema</h3>

    <div class="row mt-3">

      <!-- CARD: TIPOS DE SERVIÇO -->
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body text-center">

            <span class="badge bg-primary mb-2">Configuração</span>

            <h5>Tipos de Serviço</h5>
            <p>Cadastro de serviços (hora ou valor fixo)</p>

            <a href="tiposervico.html" class="btn btn-outline-primary w-100">
              Gerenciar
            </a>

          </div>
        </div>
      </div>

      <!-- CARD: CHAMADOS -->
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body text-center">

            <span class="badge bg-success mb-2">Operacional</span>

            <h5>Chamados</h5>
            <p>Registro e controle de atendimentos</p>

            <a href="chamado.html" class="btn btn-outline-success w-100">
              Novo Chamado
            </a>

          </div>
        </div>
      </div>

      <!-- CARD: RELATÓRIO -->
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body text-center">

            <span class="badge bg-dark mb-2">Relatórios</span>

            <h5>Relatórios</h5>
            <p>Tempo total e valores dos atendimentos</p>

            <a href="relatorio.html" class="btn btn-outline-dark w-100">
              Relatórios
            </a>

          </div>
        </div>
      </div>

    </div>

  </div>

</body>

</html>
