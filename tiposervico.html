<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tipos de Serviço</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-12 col-xl-10">

      <div class="card shadow-sm border-0">

        <!-- HEADER -->
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h5 class="mb-0 fw-semibold">Tipos de Serviço</h5>
          <a href="#" class="btn btn-light btn-sm fw-semibold" data-bs-toggle="modal" data-bs-target="#modalTipo">
            + Novo
          </a>
        </div>

        <!-- BODY -->
        <div class="card-body p-0">

          <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

              <thead class="table-light">
                <tr>
                  <th style="width: 70px;">ID</th>
                  <th>Descrição</th>
                  <th>Tipo Cobrança</th>
                  <th>Valor</th>
                  <th class="text-center" style="width: 120px;">Ações</th>
                </tr>
              </thead>

              <tbody id="tabela-tiposervico"></tbody>

            </table>

          </div>

        </div>

      </div>

    </div>
  </div>

</div>

<!-- MODAL CADASTRO -->
<div class="modal fade" id="modalTipo">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Novo Tipo de Serviço</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label>Descrição</label>
          <input id="descricao" class="form-control">
        </div>

        <div class="mb-3">
          <label>Tipo de Cobrança</label>
          <select id="tipo_cobranca" class="form-select">
            <option value="hora">Por Hora</option>
            <option value="fixo">Valor Fixo</option>
          </select>
        </div>

        <div class="mb-3">
          <label>Valor</label>
          <input id="valor" type="number" class="form-control">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarTipo()">Salvar</button>
      </div>

    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="front/js/api/config.js"></script>
<script src="front/js/api/tipo-servico.js"></script>
<script src="front/js/pages/tiposervico-page.js"></script>

</body>
</html>
