<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Relatório de Chamados</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-12 col-xl-10">

      <div class="card shadow-sm border-0">

        <!-- HEADER -->
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Relatório de Chamados</h5>
        </div>

        <!-- FILTROS -->
        <div class="card-body border-bottom">

          <div class="row g-3 align-items-end">

            <div class="col-md-4">
              <label class="form-label">Data Início</label>
              <input type="date" id="inicio" class="form-control">
            </div>

            <div class="col-md-4">
              <label class="form-label">Data Fim</label>
              <input type="date" id="fim" class="form-control">
            </div>

            <div class="col-md-4">
              <button class="btn btn-primary w-100" onclick="gerarRelatorio()">
                Gerar Relatório
              </button>
            </div>

          </div>

        </div>

        <!-- TABELA -->
        <div class="table-responsive">

          <table class="table table-hover align-middle mb-0">

            <thead class="table-light">
              <tr>
                <th>Cliente</th>
                <th>Tipo de Serviço</th>
                <th>Tempo (h)</th>
                <th>Valor (R$)</th>
              </tr>
            </thead>

            <tbody id="tabela-relatorio"></tbody>

          </table>

        </div>

        <!-- RODAPÉ -->
        <div class="card-footer d-flex justify-content-between align-items-center">

          <span class="text-muted">Resumo financeiro</span>

          <h5 class="mb-0 text-success" id="total">
            Total: R$ 0.00
          </h5>

        </div>

      </div>

    </div>
  </div>

</div>

<script src="front/js/api/config.js"></script>
<script src="front/js/api/chamado.js"></script>
<script src="front/js/pages/relatorio-page.js"></script>

</body>
</html>
